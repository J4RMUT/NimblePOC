name: Write Version File

on:
  push:
    branches:
      - '**'

jobs:
  version:
    name: Update version.txt
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write version file
        run: |
          echo "branch:     ${{ github.ref_name }}" > version.txt
          echo "commit:     ${{ github.sha }}" >> version.txt
          echo "short_sha:  $(echo ${{ github.sha }} | cut -c1-7)" >> version.txt
          echo "author:     ${{ github.actor }}" >> version.txt
          echo "timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> version.txt
          echo "run:        ${{ github.run_number }}" >> version.txt
          cat version.txt

      - name: Commit version file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git diff --cached --quiet || git commit -m "chore: update version.txt [skip ci]"
          git push
